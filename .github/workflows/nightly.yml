name: Nightly

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Check for existing nightly on this commit
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName !== 'schedule') {
              core.info('Manual nightly run requested; build will run.')
              core.setOutput('should_build', 'true')
              return
            }

            const branch = context.ref.replace('refs/heads/', '')
            const { data } = await github.rest.actions.listWorkflowRuns({
              ...context.repo,
              workflow_id: 'nightly.yml',
              branch,
              status: 'success',
              per_page: 100,
            })

            const currentSha = context.sha
            const alreadyBuilt = data.workflow_runs.some(
              (run) => run.id !== context.runId && run.head_sha === currentSha,
            )

            if (alreadyBuilt) {
              core.info(`Skipping nightly; commit ${currentSha} already has a successful nightly run.`)
              core.setOutput('should_build', 'false')
              return
            }

            core.info(`No successful nightly found for commit ${currentSha}; build will run.`)
            core.setOutput('should_build', 'true')

  build:
    needs: preflight
    if: needs.preflight.outputs.should_build == 'true'
    runs-on: macos-latest
    environment: Mac Distribution
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set nightly version
        run: |
          node - <<'NODE'
          const fs = require('node:fs')
          const path = 'apps/desktop/package.json'
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'))
          const [major, minor, patch] = pkg.version.split('.').map(Number)
          pkg.version = `${major}.${minor}.${patch + 1}`
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n')
          NODE
          NIGHTLY_VERSION="$(node -p "require('./apps/desktop/package.json').version")-beta.$(date -u +%Y%m%d%H%M)"
          NIGHTLY_VERSION="$NIGHTLY_VERSION" node - <<NODE
          const fs = require('node:fs')
          const path = 'apps/desktop/package.json'
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'))
          pkg.version = process.env.NIGHTLY_VERSION
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n')
          NODE
          echo "NIGHTLY_VERSION=$NIGHTLY_VERSION" >> "$GITHUB_ENV"

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm --filter @yachiyo/desktop run build && pnpm --filter @yachiyo/desktop exec electron-builder --mac zip --publish always -c.publish.releaseType=prerelease

      - name: Sync release to R2 mirror
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: node scripts/sync-release-to-r2.mjs --channel nightly --dist apps/desktop/dist

      - name: Generate changelog and update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${NIGHTLY_VERSION}"

          # The nightly tag was created remotely by electron-builder; use the
          # latest local stable tag as the lower bound and HEAD as the upper.
          PREV_TAG=$(git tag --sort=v:refname | awk '$0 !~ /beta/ {prev=$0} END {print prev}')

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Collect commits, skip chore/ci and merge commits
          FEATS=$(git log "$RANGE" --oneline --no-merges --grep="^feat" --format="- %s (%h)" | sed 's/^- feat[^:]*: /- /')
          FIXES=$(git log "$RANGE" --oneline --no-merges --grep="^fix" --format="- %s (%h)" | sed 's/^- fix[^:]*: /- /')
          REFACTORS=$(git log "$RANGE" --oneline --no-merges --grep="^refactor" --format="- %s (%h)" | sed 's/^- refactor[^:]*: /- /')

          BODY=""
          if [ -n "$FEATS" ]; then
            BODY="${BODY}## Features\n${FEATS}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## Bug Fixes\n${FIXES}\n\n"
          fi
          if [ -n "$REFACTORS" ]; then
            BODY="${BODY}## Refactors\n${REFACTORS}\n\n"
          fi

          if [ -z "$BODY" ]; then
            if [ -n "$PREV_TAG" ]; then
              BODY="Maintenance release — see [commit history](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}) for details."
            else
              BODY="Initial release."
            fi
          fi

          printf '%b' "$BODY" | gh release edit "$TAG" --notes-file -
