name: Nightly

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    environment: Mac Distribution
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set nightly version
        run: |
          npm version patch --no-git-tag-version
          NIGHTLY_VERSION="$(node -p "require('./package.json').version")-beta.$(date -u +%Y%m%d%H%M)"
          npm version "$NIGHTLY_VERSION" --no-git-tag-version
          echo "NIGHTLY_VERSION=$NIGHTLY_VERSION" >> "$GITHUB_ENV"

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm run build && pnpm exec electron-builder --mac zip --publish always -c.publish.releaseType=prerelease

      - name: Generate changelog and update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${NIGHTLY_VERSION}"

          # The nightly tag was created remotely by electron-builder; use the
          # latest local stable tag as the lower bound and HEAD as the upper.
          PREV_TAG=$(git tag --sort=v:refname | awk '$0 !~ /beta/ {prev=$0} END {print prev}')

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Collect commits, skip chore/ci and merge commits
          FEATS=$(git log "$RANGE" --oneline --no-merges --grep="^feat" --format="- %s (%h)" | sed 's/^- feat[^:]*: /- /')
          FIXES=$(git log "$RANGE" --oneline --no-merges --grep="^fix" --format="- %s (%h)" | sed 's/^- fix[^:]*: /- /')
          REFACTORS=$(git log "$RANGE" --oneline --no-merges --grep="^refactor" --format="- %s (%h)" | sed 's/^- refactor[^:]*: /- /')

          BODY=""
          if [ -n "$FEATS" ]; then
            BODY="${BODY}## Features\n${FEATS}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## Bug Fixes\n${FIXES}\n\n"
          fi
          if [ -n "$REFACTORS" ]; then
            BODY="${BODY}## Refactors\n${REFACTORS}\n\n"
          fi

          if [ -z "$BODY" ]; then
            if [ -n "$PREV_TAG" ]; then
              BODY="Maintenance release — see [commit history](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}) for details."
            else
              BODY="Initial release."
            fi
          fi

          printf '%b' "$BODY" | gh release edit "$TAG" --notes-file -
