name: Changeset

on:
  push:
    branches: [main]

concurrency:
  group: changeset-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.version-and-tag.outputs.released }}
      tag: ${{ steps.version-and-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version, tag, and push
        id: version-and-tag
        run: |
          # Check if there are changeset files to consume
          CHANGESETS=$(ls .changeset/*.md 2>/dev/null | grep -v README.md || true)
          if [ -z "$CHANGESETS" ]; then
            echo "No changesets found, skipping."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Consume changesets: bump version + update changelog
          pnpm changeset version

          # Read the new version
          VERSION="v$(node -p "require('./package.json').version")"
          echo "New version: $VERSION"

          # Commit directly to main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: version packages"
          git tag -a "$VERSION" -m "$VERSION"
          git push origin main --follow-tags

          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: version
    if: needs.version.outputs.released == 'true'
    runs-on: macos-latest
    environment: Mac Distribution
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm run build && pnpm exec electron-builder --mac zip --publish always
