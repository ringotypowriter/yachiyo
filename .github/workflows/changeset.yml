name: Changeset

on:
  push:
    branches: [main]

concurrency:
  group: changeset-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.version-and-tag.outputs.released }}
      tag: ${{ steps.version-and-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version, tag, and push
        id: version-and-tag
        run: |
          # Check if there are changeset files to consume
          CHANGESETS=$(ls .changeset/*.md 2>/dev/null | grep -v README.md || true)
          if [ -z "$CHANGESETS" ]; then
            echo "No changesets found, skipping."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Consume changesets: bump version + update changelog
          pnpm changeset version

          # Read the new version
          VERSION="v$(node -p "require('./package.json').version")"
          echo "New version: $VERSION"

          # Commit directly to main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: version packages"
          git tag -a "$VERSION" -m "$VERSION"
          git push origin main --follow-tags

          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: version
    if: needs.version.outputs.released == 'true'
    runs-on: macos-latest
    environment: Mac Distribution
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm run build && pnpm exec electron-builder --mac zip --publish always

      - name: Generate changelog and update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"

          # Find the stable tag immediately before the requested tag, ignoring beta tags as boundaries
          PREV_TAG=$(git tag --sort=v:refname | awk -v t="$TAG" '$0 == t {print prev; exit} $0 !~ /beta/ {prev=$0}')

          if [ -z "$PREV_TAG" ]; then
            RANGE="$TAG"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          # Collect commits, skip chore/ci and merge commits
          FEATS=$(git log "$RANGE" --oneline --no-merges --grep="^feat" --format="- %s (%h)" | sed 's/^- feat[^:]*: /- /')
          FIXES=$(git log "$RANGE" --oneline --no-merges --grep="^fix" --format="- %s (%h)" | sed 's/^- fix[^:]*: /- /')
          REFACTORS=$(git log "$RANGE" --oneline --no-merges --grep="^refactor" --format="- %s (%h)" | sed 's/^- refactor[^:]*: /- /')

          BODY=""
          if [ -n "$FEATS" ]; then
            BODY="${BODY}## Features\n${FEATS}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## Bug Fixes\n${FIXES}\n\n"
          fi
          if [ -n "$REFACTORS" ]; then
            BODY="${BODY}## Refactors\n${REFACTORS}\n\n"
          fi

          if [ -z "$BODY" ]; then
            if [ -n "$PREV_TAG" ]; then
              BODY="Maintenance release — see [commit history](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}) for details."
            else
              BODY="Initial release."
            fi
          fi

          printf '%b' "$BODY" | gh release edit "$TAG" --notes-file -
